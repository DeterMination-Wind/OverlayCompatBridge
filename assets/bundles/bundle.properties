overlayUI.tips = [gold]Tips:[]\n1. Default PC shortcut is Z, configurable in settings.\n2. Locked windows can stay visible in-game.\n3. You can use the left toggle button as a quick collapse switch.\n4. After locking, content area stays stable and adsorption follows automatically.\n5. On mobile, adjust window scale in each window settings panel.
keybind.overlayUI.name = Toggle OverlayUI
